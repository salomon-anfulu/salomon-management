<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安福路 Salomon - 兼职团队</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a1a2e;
      --primary-light: #2d2d4a;
      --accent: #e94560;
      --accent-hover: #d63851;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --bg: #f8fafc;
      --border: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      background: linear-gradient(135deg, #1a1a2e, #2d2d4a);
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
    }

    .login-header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 20px solid #2d2d4a;
    }

    .brand-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 8px;
    }

    .brand-title {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      margin-top: 4px;
    }

    .login-body {
      padding: 44px 28px 32px;
      text-align: center;
    }

    .welcome-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #c0392b);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 1px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .login-footer {
      text-align: center;
      padding: 0 28px 20px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <span class="brand-icon">🏔️</span>
      <div class="brand-title">Salomon 安福路</div>
      <div class="brand-sub">L140 兼职团队数据平台</div>
    </div>
    <div class="login-body">
      <div class="welcome-text">欢迎进入兼职团队管理系统<br>点击下方按钮直接登录</div>
      <button class="btn-login" onclick="doLogin()">进入系统</button>
    </div>
    <div class="login-footer">
      安福路 Salomon 旗舰店 · 数据截至2026年6月
    </div>
  </div>

  <script>
    function doLogin() {
      sessionStorage.setItem('auth', JSON.stringify({
        role: 'admin',
        staffId: null,
        staffName: null,
        dept: null,
        loginTime: Date.now()
      }));
      window.location.href = 'app.html';
    }
  </script>
</body>
</html>
